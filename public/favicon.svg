<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="whiteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer disc shadow -->
  <circle cx="16" cy="16" r="14" fill="url(#purpleGradient)" opacity="0.3"/>
  
  <!-- Main disc -->
  <circle cx="16" cy="16" r="12" fill="url(#purpleGradient)"/>
  
  <!-- Inner grooves -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="url(#whiteGradient)" stroke-width="0.5" opacity="0.6"/>
  <circle cx="16" cy="16" r="6" fill="none" stroke="url(#whiteGradient)" stroke-width="0.5" opacity="0.4"/>
  <circle cx="16" cy="16" r="3" fill="none" stroke="url(#whiteGradient)" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Center label -->
  <circle cx="16" cy="16" r="2" fill="url(#whiteGradient)"/>
  <circle cx="16" cy="16" r="1" fill="url(#purpleGradient)"/>
  
  <!-- Highlight effect -->
  <ellipse cx="12" cy="12" rx="4" ry="3" fill="white" opacity="0.2"/>
</svg>
